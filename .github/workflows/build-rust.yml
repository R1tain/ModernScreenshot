name: Build and Release (Rust)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  RUST_VERSION: stable

jobs:
  build-rust:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ env.RUST_VERSION }}
        targets: x86_64-pc-windows-msvc

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Read version
      id: version
      shell: pwsh
      run: |
        $versionInfo = Get-Content version.json | ConvertFrom-Json
        $version = $versionInfo.version
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "Building Rust version: $version"

    - name: Build Release
      run: cargo build --release

    - name: Check Binary Size
      shell: pwsh
      run: |
        $exe = "target/release/modernscreenshot.exe"
        if (Test-Path $exe) {
          $size = (Get-Item $exe).Length
          $sizeMB = [math]::Round($size / 1MB, 2)
          Write-Host "✅ Binary size: $sizeMB MB"
          if ($sizeMB -gt 5) {
            Write-Warning "⚠️  Size exceeds 5MB target"
          } else {
            Write-Host "✅ Size target met!"
          }
        }

    - name: Create Portable ZIP
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        Compress-Archive -Path target/release/modernscreenshot.exe -DestinationPath "ModernScreenshot_Rust_$version.zip"

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rust-release
        path: |
          ModernScreenshot_Rust_*.zip
          target/release/modernscreenshot.exe

    - name: Increment version
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      shell: pwsh
      run: |
        $versionInfo = Get-Content version.json | ConvertFrom-Json
        $version = $versionInfo.version
        $parts = $version.Split('.')
        $parts[2] = [int]$parts[2] + 1
        $newVersion = $parts -join '.'
        $versionInfo.version = $newVersion
        $versionInfo | ConvertTo-Json | Set-Content version.json

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add version.json
        git commit -m "chore: bump version to $newVersion [skip ci]"
        git push origin HEAD:master

    - name: Create Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: Release v${{ steps.version.outputs.VERSION }} (Rust)
        draft: false
        prerelease: false
        body: |
          ## 🦀 Rust 重写版本

          **体积对比**:
          - C# 版本: ~25MB
          - Rust 版本: **< 3MB** ✅

          **优势**:
          - 🚀 启动极快 (< 50ms)
          - 💾 内存占用极低 (~8MB)
          - 📦 单文件，无依赖
          - ⚡ 原生性能

          **下载**:
          - `ModernScreenshot_Rust_*.zip` - 绿色单文件版

          **快捷键**: Ctrl+1
        files: |
          ModernScreenshot_Rust_*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
