name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        default: v0.1.0
      prerelease:
        description: Mark as prerelease
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - id: meta
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            tag="${{ github.ref_name }}"
            prerelease="false"
          else
            tag="${{ inputs.tag }}"
            prerelease="${{ inputs.prerelease }}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+)*([-.][A-Za-z0-9]+)*$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

  linux:
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libx11-dev libxrender-dev xvfb
      - name: Build
        run: make release VERSION="${{ needs.metadata.outputs.version }}"
      - name: Smoke test
        run: make smoke
      - name: Editor export test
        run: xvfb-run -a ./build/modern-screenshot --self-test /tmp/modern-screenshot-editor-test.png
      - name: Memory check
        run: xvfb-run -a make memory-check
      - name: Package Linux tarball
        shell: bash
        run: |
          package="ModernScreenshot-linux-x64"
          mkdir -p "dist/$package"
          cp build/modern-screenshot "dist/$package/"
          cp README.md LICENSE "dist/$package/"
          tar -C dist -czf "dist/$package.tar.gz" "$package"
      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: ModernScreenshot-linux-x64
          path: dist/ModernScreenshot-linux-x64.tar.gz

  windows:
    runs-on: windows-latest
    needs: metadata
    steps:
      - uses: actions/checkout@v4
      - name: Configure MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Build Windows exe
        shell: pwsh
        run: ./scripts/build-windows.ps1 -Configuration Release -Version "${{ needs.metadata.outputs.version }}"
      - name: Smoke test
        shell: pwsh
        run: ./build/windows/ModernScreenshot.exe --version
      - name: Self-test PNG export
        shell: pwsh
        run: ./build/windows/ModernScreenshot.exe --self-test "$env:TEMP\modern-screenshot-win-test.png"
      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: ModernScreenshot-windows-x64
          path: build/windows/ModernScreenshot-windows-x64.zip

  publish:
    runs-on: ubuntu-latest
    needs:
      - metadata
      - linux
      - windows
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.metadata.outputs.tag }}
          PRERELEASE: ${{ needs.metadata.outputs.prerelease }}
          TARGET: ${{ github.sha }}
        shell: bash
        run: |
          mapfile -t assets < <(find dist -type f \( -name "*.zip" -o -name "*.tar.gz" \) | sort)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No release assets found" >&2
            exit 1
          fi

          {
            echo "ModernScreenshot $TAG"
            echo
            echo "Assets:"
            for asset in "${assets[@]}"; do
              echo "- $(basename "$asset")"
            done
          } > RELEASE_NOTES.md

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "ModernScreenshot $TAG" --notes-file RELEASE_NOTES.md
            gh release upload "$TAG" "${assets[@]}" --clobber
          else
            args=(--title "ModernScreenshot $TAG" --notes-file RELEASE_NOTES.md --target "$TARGET")
            if [[ "$PRERELEASE" == "true" ]]; then
              args+=(--prerelease)
            fi
            gh release create "$TAG" "${assets[@]}" "${args[@]}"
          fi
